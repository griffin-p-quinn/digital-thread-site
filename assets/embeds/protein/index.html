        overflow-x: hidden;

      @media (max-width: 600px) {
        #root { min-width: 0; width: 100%; overflow-x: hidden; }
        #root > div { min-width: 0 !important; width: 100% !important; padding: 16px !important; }
        #root h1 { font-size: clamp(2.15rem, 15vw, 3.1rem) !important; line-height: .92 !important; overflow-wrap: anywhere; }
        #root h2 { font-size: 1.25rem !important; }

        #root button { max-width: 100%; white-space: normal; }
        #root [style*="display: flex"] { min-width: 0; max-width: 100%; flex-wrap: wrap !important; }

    <script>
      // The published portfolio has no backend. Keep the app's snapshot workflow
      // functional with a session-only, same-page fixture instead of making dead API calls.
      (() => {
        const nativeFetch = window.fetch.bind(window);
        const snapshots = [];
        window.fetch = async (input, init = {}) => {
          const raw = typeof input === 'string' ? input : input.url;
          const url = new URL(raw, window.location.href);
          if (!url.pathname.startsWith('/api/snapshots')) return nativeFetch(input, init);
          const method = (init.method || (typeof input !== 'string' && input.method) || 'GET').toUpperCase();
          if (method === 'POST') {
            const body = JSON.parse(init.body || '{}');
            snapshots.push({ ...body, timestamp: new Date().toISOString() });
            return new Response(JSON.stringify(body), { status: 201, headers: { 'Content-Type': 'application/json' } });
          }
          if (method === 'DELETE') {
            const id = decodeURIComponent(url.pathname.split('/').pop());
            const index = snapshots.findIndex(item => item.id === id);
            if (index >= 0) snapshots.splice(index, 1);
            return new Response(null, { status: 204 });
          }
          return new Response(JSON.stringify(snapshots), { status: 200, headers: { 'Content-Type': 'application/json' } });
        };
      })();
    </script>
